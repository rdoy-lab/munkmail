<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html>
<head>
<title>{{.Org}} - Raw Message</title>
</head>
<body bgcolor="#FFFFFF" text="#000000" link="#0000CC" vlink="#0000CC" alink="#0000CC">

<table width="100%" border="0" cellspacing="0" cellpadding="2">
<tr bgcolor="#DCDCDC">
  <td align="left"><font size="2"><b>Current Folder: {{.Folder}}</b></font></td>
  <td align="right"><font size="2"><a href="/logout" target="_top"><b>Sign Out</b></a></font></td>
</tr>
</table>

<table width="100%" border="0" cellspacing="0" cellpadding="2">
<tr bgcolor="#ABABAB">
  <td align="left"><font size="2">
    <a href="/read?folder={{.Folder | urlquery}}&uid={{.UID}}&page={{.Page}}"><b>&laquo; Back to Message</b></a>
  </font></td>
</tr>
</table>

<table width="100%" border="0" cellspacing="0" cellpadding="2">
<tr bgcolor="#FFFFCC">
  <td><font size="2"><b>Raw Source</b></font></td>
</tr>
</table>

<table width="100%" border="0" cellspacing="0" cellpadding="10">
<tr bgcolor="#FFFFFF">
  <td><pre><font size="2">{{.RawBody}}</font></pre></td>
</tr>
</table>

</body>
</html>
