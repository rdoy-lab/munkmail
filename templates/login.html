<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html>
<head>
<title>{{.Org}} - Login</title>
</head>
<body bgcolor="#FFFFFF" text="#000000" link="#0000CC" vlink="#0000CC" alink="#0000CC">
<br><br>
<center>
<table width="350" border="0" cellspacing="0" cellpadding="0">
<tr><td bgcolor="#000000">
  <table width="100%" border="0" cellspacing="1" cellpadding="0">
  <tr><td bgcolor="#DCDCDC" align="center">
    <font size="4"><b>{{.Org}}</b></font><br>
    <font size="2">Webmail the old way</font>
  </td></tr>
  <tr><td bgcolor="#FFFFFF">
    <form action="/login" method="post">
    <input type="hidden" name="token" value="{{.Token}}">
    <table border="0" cellspacing="0" cellpadding="5" align="center">
    {{if .Error}}
    <tr><td colspan="2" align="center"><font size="2" color="#CC0000"><b>{{.Error}}</b></font></td></tr>
    {{end}}
    <tr>
      <td align="right"><font size="2"><b>Name:</b></font></td>
      <td><input type="text" name="login_username" size="20" value="{{.User}}"></td>
    </tr>
    <tr>
      <td align="right"><font size="2"><b>Password:</b></font></td>
      <td><input type="password" name="secretkey" size="20"></td>
    </tr>
    <tr>
      <td colspan="2" align="center"><input type="submit" value="Login"></td>
    </tr>
    </table>
    </form>
  </td></tr>
  </table>
</td></tr>
</table>
<br>
<font size="1">{{.Org}} &middot; a SquirrelMail-style webmail written in Go &middot; best viewed in Internet Explorer 5</font>
</center>
</body>
</html>
