<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html>
<head>
<title>{{.Org}} - Folders</title>
</head>
<body bgcolor="#FFFFFF" text="#000000" link="#0000CC" vlink="#0000CC" alink="#0000CC">

<table width="100%" border="0" cellspacing="0" cellpadding="2">
<tr bgcolor="#DCDCDC">
  <td align="center"><font size="2"><b>Folder Options</b></font></td>
</tr>
</table>

{{if .Note}}
<table width="100%" border="0" cellspacing="0" cellpadding="2">
<tr><td align="center" bgcolor="#FFFFCC"><font size="2" color="#800000"><b>{{.Note}}</b></font></td></tr>
</table>
{{end}}

<br>
<center>
<table width="70%" border="0" cellspacing="0" cellpadding="4">
<tr bgcolor="#FFFFCC"><td align="center"><font size="2"><b>Create Folder</b></font></td></tr>
<tr bgcolor="#EDEDED"><td align="center">
  <form action="/folders" method="post">
  <input type="hidden" name="token" value="{{$.Token}}">
  <input type="hidden" name="do" value="create">
  <font size="2">Folder name: <input type="text" name="name" size="25">
  <input type="submit" value="Create"></font>
  </form>
</td></tr>
</table>
<br>
<table width="70%" border="0" cellspacing="0" cellpadding="4">
<tr bgcolor="#FFFFCC"><td align="center"><font size="2"><b>Rename Folder</b></font></td></tr>
<tr bgcolor="#EDEDED"><td align="center">
  <form action="/folders" method="post">
  <input type="hidden" name="token" value="{{$.Token}}">
  <input type="hidden" name="do" value="rename">
  <font size="2">
  <select name="name">
  {{range .Folders}}<option value="{{.Name}}">{{.Name}}</option>
  {{end}}</select>
  to <input type="text" name="newname" size="25">
  <input type="submit" value="Rename"></font>
  </form>
</td></tr>
</table>
<br>
<table width="70%" border="0" cellspacing="0" cellpadding="4">
<tr bgcolor="#FFFFCC"><td align="center"><font size="2"><b>Delete Folder</b></font></td></tr>
<tr bgcolor="#EDEDED"><td align="center">
  <form action="/folders" method="post">
  <input type="hidden" name="token" value="{{$.Token}}">
  <input type="hidden" name="do" value="delete">
  <font size="2">
  <select name="name">
  {{range .Folders}}<option value="{{.Name}}">{{.Name}}</option>
  {{end}}</select>
  <input type="submit" value="Delete"></font>
  </form>
</td></tr>
</table>
<br>
<font size="2"><a href="/right?folder=INBOX">Back to INBOX</a></font>
</center>

</body>
</html>
