<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html>
<head>
<title>{{.Org}} - Compose</title>
</head>
<body bgcolor="#FFFFFF" text="#000000" link="#0000CC" vlink="#0000CC" alink="#0000CC">

<table width="100%" border="0" cellspacing="0" cellpadding="2">
<tr bgcolor="#DCDCDC">
  <td align="center"><font size="2"><b>Compose Message</b></font></td>
</tr>
</table>

{{if .Error}}
<table width="100%" border="0" cellspacing="0" cellpadding="2">
<tr><td align="center" bgcolor="#FFFFCC"><font size="2" color="#CC0000"><b>{{.Error}}</b></font></td></tr>
</table>
{{end}}

<form action="/send" method="post" enctype="multipart/form-data">
<input type="hidden" name="token" value="{{.Token}}">
<input type="hidden" name="folder" value="{{.Folder}}">
<table width="100%" border="0" cellspacing="0" cellpadding="2">
<tr>
  <td width="10%" align="right"><font size="2"><b>From:</b></font></td>
  <td><font size="2">{{.From}}</font></td>
</tr>
<tr>
  <td align="right"><font size="2"><b>To:</b></font></td>
  <td><input type="text" name="send_to" size="60" value="{{.To}}"></td>
</tr>
<tr>
  <td align="right"><font size="2"><b>Cc:</b></font></td>
  <td><input type="text" name="send_to_cc" size="60" value="{{.Cc}}"></td>
</tr>
<tr>
  <td align="right"><font size="2"><b>Bcc:</b></font></td>
  <td><input type="text" name="send_to_bcc" size="60" value=""></td>
</tr>
<tr>
  <td align="right"><font size="2"><b>Subject:</b></font></td>
  <td><input type="text" name="subject" size="60" value="{{.Subject}}"></td>
</tr>
<tr>
  <td align="right" valign="top"><font size="2"><b>Attach:</b></font></td>
  <td><input type="file" name="attachment" size="40"></td>
</tr>
<tr>
  <td>&nbsp;</td>
  <td><textarea name="body" rows="20" cols="76" wrap="hard">{{.Body}}</textarea></td>
</tr>
<tr>
  <td>&nbsp;</td>
  <td>
    <input type="submit" value="Send">
    &nbsp;&nbsp;<font size="2"><a href="/right?folder={{.Folder | urlquery}}">Cancel</a></font>
  </td>
</tr>
</table>
</form>

</body>
</html>
